# 提示词模板配置
# 用于 AI 生成 SQL、解释、优化等场景

prompts:
  # 自然语言转 SQL
  nl_2_sql:
    name: "nl_2_sql"
    description: "将自然语言转换成SQL查询"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}

  # SQL 解释
  sql_explain:
    name: "sql_explain"
    description: "解释SQL"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}

  # SQL 优化
  sql_optimizer:
    name: "sql_optimizer"
    description: "提供优化建议"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}

  # SQL 转换
  sql_2_sql:
    name: "sql_2_sql"
    description: "进行SQL转换"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}
      #
      ### 目标 SQL 类型：{target_sql_type}

  # 表选择
  select_tables:
    name: "select_tables"
    description: "Select tables for query"
    template: |
      ### Based on the following table properties and SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}
      
      Output only JSON in format: {"table_names":["table1","table2"]}. Do not output any other text.

  # 文本生成
  text_generation:
    name: "text_generation"
    description: "文本生成"
    template: "{message}"

  # 标题生成
  title_generation:
    name: "title_generation"
    description: "生成标题"
    template: |
      请为以下 SQL 查询生成一个简洁的中文标题（不超过 20 字），直接输出标题内容，不要包含任何引号或额外解释：
      
      {message}

  # 自然语言转注释
  nl_2_comment:
    name: "nl_2_comment"
    description: "猜测表和字段注释"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      ### 任务：为表和字段生成合适的中文注释
      
      请分析以下表和字段的用途，为它们生成准确、简洁的中文注释。
      
      **输出格式要求（严格遵守 JSON 格式）：**
      
      ```json
      {
        "table_comment": "表的注释内容",
        "column_comments": [
          {
            "column_name": "字段名1",
            "comment": "字段1的注释内容"
          },
          {
            "column_name": "字段名2",
            "comment": "字段2的注释内容"
          }
        ]
      }
      ```
      
      **注意事项：**
      1. 只输出 JSON 内容，不要包含其他解释文字
      2. 注释应该简洁明了，不超过 50 字
      3. 注释应该准确反映表/字段的业务含义
      4. 使用中文注释

  # 批量猜测表注释
  nl_2_comment_batch:
    name: "nl_2_comment_batch"
    description: "批量猜测表注释"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      ### 任务：为所有表生成合适的中文注释
      
      请根据表名和字段名推测每个表的业务含义，生成简洁的中文注释。
      
      **输出格式要求（严格遵守 JSON 格式）：**
      
      ```json
      {
        "tables": [
          {
            "table_name": "表名1",
            "table_comment": "表1的注释内容"
          },
          {
            "table_name": "表名2",
            "table_comment": "表2的注释内容"
          }
        ]
      }
      ```
      
      **注意事项：**
      1. 只输出 JSON 内容，不要包含其他解释文字
      2. 注释应该简洁明了，不超过 50 字
      3. 注释应该准确反映表的业务含义
      4. 使用中文注释

  # 智能字段映射推荐
  nl_2_field_mapping:
    name: "nl_2_field_mapping"
    description: "智能字段映射推荐"
    template: |
      ### 任务：根据源文件字段和目标数据库表结构，推荐最佳字段映射方案
      
      **数据库类型**: {db_type}
      
      **源文件字段列表**:
      {source_fields}
      
      **目标表字段结构**:
      {schema}
      
      **要求**:
      1. 根据字段名、数据类型、语义智能匹配源字段到目标字段
      2. 考虑数据类型兼容性
      3. 考虑字段命名语义相似性（如 name -> user_name, email -> user_email）
      4. 为每个源字段推荐最合适的目标字段
      5. 如果某个源字段没有合适的目标字段，可以省略
      
      **输出格式（严格 JSON，不要包含其他文字）**:
      ```json
      {
        "mappings": [
          {
            "sourceField": "源字段名",
            "targetField": "目标字段名",
            "confidence": 0.95
          }
        ]
      }
      ```
      
      **注意事项**:
      1. 只输出 JSON 内容，不要包含其他解释文字
      2. confidence 值为 0-1 之间的小数，表示匹配置信度
      3. 确保所有 sourceField 都在源字段列表中存在
      4. 确保所有 targetField 都在目标表字段结构中存在

  # 智能数据生成表达式推荐
  nl_2_data_expression:
    name: "nl_2_data_expression"
    description: "智能数据生成表达式推荐"
    template: |
      ### 任务：为数据库表的每个字段推荐合适的 datafaker 表达式

      **数据库类型**: {db_type}
      
      **表字段信息**:
      {schema}
      
      **可用的 datafaker 表达式示例**:
      - 姓名: #{Name.first_name}, #{Name.last_name}, #{Name.full_name}
      - 邮箱: #{Internet.email_address}, #{Internet.url}
      - 电话: #{Phone.cell_phone}, #{Phone.phone_number}
      - 地址: #{Address.full_address}, #{Address.city}, #{Address.country}
      - 日期: #{Date.past '30','DAYS'}, #{Date.future}, #{Date.birthday}
      - 数值: #{Number.number_between '1','1000'}, #{Number.random_double '2','0','9999'}
      - 文本: #{Lorem.sentence}, #{Lorem.word}, #{Lorem.paragraph}
      - 公司: #{Company.name}, #{Company.industry}, #{Company.catch_phrase}
      - ID: #{Code.isbn}, #{Code.asin}, #{Number.uuid}
      - 布尔: #{bool.bool}
      
      **要求**:
      1. 根据字段名、数据类型、注释推荐合适的表达式
      2. 考虑数据类型和长度限制（如 VARCHAR 长度、DECIMAL 精度）
      3. 表达式必须符合 datafaker 语法
      4. 如果字段是主键或自增，可以跳过
      5. 如果字段允许 NULL 且没有合适表达式，可以留空
      
      **输出格式（严格 JSON，不要包含其他文字）**:
      ```json
      {
        "column_expressions": [
          {
            "column_name": "字段名",
            "expression": "#{Name.first_name}",
            "reason": "推荐原因"
          }
        ]
      }
      ```
      
      **注意事项**:
      1. 只输出 JSON 内容，不要包含其他解释文字
      2. expression 必须是有效的 datafaker 表达式，以 # 开头
      3. reason 简要说明为什么推荐这个表达式
      4. 确保所有 column_name 都在表字段信息中存在

  # SQL错误修复
  sql_fix:
    name: "sql_fix"
    description: "SQL错误修复"
    template: |
      ### 任务：分析并修复SQL执行错误
      
      **数据库类型**: {db_type}
      
      **错误信息**:
      {error_message}
      
      **原始SQL**:
      {original_sql}
      
      **要求**:
      1. 分析错误原因
      2. 提供修复后的SQL
      3. 解释修复的内容
      4. 如果无法修复，请说明原因并提供建议
      
      **输出格式（严格 JSON，不要包含其他文字）**:
      ```json
      {
        "error_analysis": "错误原因分析",
        "fixed_sql": "修复后的SQL语句",
        "explanation": "修复说明",
        "can_fix": true
      }
      ```
      
      **注意事项**:
      1. 只输出 JSON 内容，不要包含其他解释文字
      2. fixed_sql 必须是完整可执行的SQL
      3. can_fix 表示是否可以修复（true/false）
      4. 如果无法修复，can_fix 设为 false，fixed_sql 留空
